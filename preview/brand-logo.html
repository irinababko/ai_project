<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px 24px;background:var(--bg-0);display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center;}
.cell{display:flex;align-items:center;gap:14px;padding:18px;border:1px solid var(--hairline);border-radius:16px;}
.dark{background:#0d0d0d;}
.light{background:#fff;}
.mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7b64ff,#0a5cff);box-shadow:0 6px 24px rgba(10,92,255,0.4);}
.wm{font:700 28px/1 var(--font-display);letter-spacing:-.02em;}
.lbl{flex-basis:100%;font:500 11px/1.2 var(--font-data);color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;}
</style></head><body>
<div class="cell dark"><div class="mark"></div><span class="wm" style="color:#fff">Proximity</span></div>
<div class="cell light"><div class="mark"></div><span class="wm" style="color:#0d0d0d">Proximity</span></div>
<div class="lbl">Wordmark — Darker Grotesque 700, −0.02em · gradient mark glyph</div>
</body></html>
