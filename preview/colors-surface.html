<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.sw{border-radius:12px;padding:12px;height:90px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--hairline);}
.lbl{font:500 11px/1.2 var(--font-data);text-transform:uppercase;letter-spacing:.06em;color:var(--fg-2);}
.hex{font:400 10px/1.2 var(--font-data);color:var(--fg-3);}
</style></head><body>
<div class="sw" style="background:var(--bg-0)"><span class="lbl">--bg-0</span><span class="hex">#0d0d0d</span></div>
<div class="sw" style="background:var(--bg-1)"><span class="lbl">--bg-1</span><span class="hex">#141414</span></div>
<div class="sw" style="background:var(--bg-2)"><span class="lbl">--bg-2</span><span class="hex">#171717</span></div>
<div class="sw" style="background:var(--bg-3)"><span class="lbl">--bg-3</span><span class="hex">#1f1f1f</span></div>
<div class="sw" style="background:var(--ink-deep)"><span class="lbl">--ink-deep</span><span class="hex">#0f172a</span></div>
<div class="sw" style="background:var(--ink-edge)"><span class="lbl">--ink-edge</span><span class="hex">#1e293b</span></div>
<div class="sw" style="background:rgba(15,23,42,0.6);border:1.2px solid var(--hairline)"><span class="lbl">FAQ row</span><span class="hex">ink-deep · 60%</span></div>
<div class="sw" style="background:rgba(255,255,255,0.04);border:1px solid var(--glass-stroke)"><span class="lbl">glass tint</span><span class="hex">white 4% + 15%</span></div>
</body></html>
