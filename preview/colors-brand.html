<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.sw{border-radius:12px;padding:12px;height:90px;display:flex;flex-direction:column;justify-content:flex-end;}
.lbl{font:500 11px/1.2 var(--font-data);text-transform:uppercase;letter-spacing:.06em;color:#fff;}
.hex{font:400 10px/1.2 var(--font-data);color:rgba(255,255,255,0.7);}
.dark .lbl{color:#fff}
</style></head><body>
<div class="sw" style="background:var(--brand-blue)"><span class="lbl">--brand-blue</span><span class="hex">#0a5cff · primary</span></div>
<div class="sw" style="background:var(--brand-blue-2)"><span class="lbl">--brand-blue-2</span><span class="hex">#4e2fff · CTA glass</span></div>
<div class="sw" style="background:var(--brand-violet)"><span class="lbl">--brand-violet</span><span class="hex">#7b64ff</span></div>
<div class="sw" style="background:var(--brand-violet-2)"><span class="lbl">--violet-2</span><span class="hex">#4845d2</span></div>
<div class="sw" style="background:var(--brand-lilac)"><span class="lbl" style="color:#222">--brand-lilac</span><span class="hex" style="color:#444">#e2dcf5</span></div>
<div class="sw" style="background:rgba(10,92,255,0.48)"><span class="lbl">blue 48%</span><span class="hex">ambient glow</span></div>
<div class="sw" style="background:rgba(78,47,255,0.40)"><span class="lbl">violet 40%</span><span class="hex">CTA fill</span></div>
<div class="sw" style="background:var(--success)"><span class="lbl" style="color:#222">--success</span><span class="hex" style="color:#444">#ffc300</span></div>
</body></html>
