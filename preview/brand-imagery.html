<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:flex;gap:18px;align-items:center;}
.tile{width:200px;height:200px;border-radius:20px;border:1px solid var(--hairline);background-size:cover;background-position:center;flex:none;}
.note{flex:1;}
.h{font:500 18px/1.3 var(--font-display);color:#fff;margin:0 0 8px;}
.p{font:400 14px/1.5 var(--font-body);color:var(--fg-3);margin:0;}
</style></head><body>
<div class="tile" style="background-image:url(../assets/images/orb-globe.jpg)"></div>
<div class="tile" style="background-image:url(../assets/images/testimonial-avatar.jpg)"></div>
<div class="note">
  <p class="h">Imagery vibe</p>
  <p class="p">Cool, deep-space tones for environmental imagery (orb / globe used as the hero centerpiece). People imagery sits on a 20px-radius square — natural light, no warm filters. Never gradient-colored.</p>
</div>
</body></html>
