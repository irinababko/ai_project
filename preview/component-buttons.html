<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px 28px;background:var(--bg-0);display:flex;gap:18px;flex-wrap:wrap;align-items:center;}
.btn{font-family:var(--font-display);font-weight:500;cursor:pointer;}
.cta-primary{
  font-size:20px;color:#fff;line-height:1;padding:14px 28px;border:none;border-radius:10.25px;
  background:rgba(78,47,255,0.4);
  border:1.28px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(18px);
  box-shadow:inset 0 0 7.7px 3.8px rgba(255,255,255,0.25);
}
.cta-frame{
  font-size:20px;color:#fff;padding:8px;border-radius:19.84px;
  border:1.65px solid rgba(255,255,255,0.15);
  display:inline-flex;
}
.cta-frame > span{
  display:inline-flex;padding:14px 28px;border-radius:13.2px;
  background:rgba(78,47,255,0.4);
  border:1.65px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(23px);
  box-shadow:inset 0 0 9.9px 4.96px rgba(255,255,255,0.25);
}
.cta-secondary{
  font-size:18px;color:var(--fg-soft);padding:14px 28px;border-radius:12.9px;
  background:radial-gradient(rgba(255,255,255,0) 0%, rgba(255,255,255,0.16) 100%);
  border:1.29px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(38px);
}
.btn-ghost{
  font-size:16px;color:var(--fg-1);padding:12px 22px;border-radius:9999px;
  background:transparent;border:1px solid rgba(255,255,255,0.15);
}
.btn-icon{
  width:44px;height:44px;border-radius:50%;background:var(--brand-blue);
  display:inline-flex;align-items:center;justify-content:center;color:#fff;border:none;
}
.btn-icon-outline{
  width:44px;height:44px;border-radius:50%;background:transparent;
  border:1px solid rgb(127,127,138);color:rgb(127,127,138);
  display:inline-flex;align-items:center;justify-content:center;
}
</style></head><body>
<button class="btn cta-frame"><span>book a call</span></button>
<button class="btn cta-primary">book a call</button>
<button class="btn cta-secondary">Get a Visibility Audit</button>
<button class="btn btn-ghost">How It Works</button>
<button class="btn-icon">→</button>
<button class="btn-icon-outline">←</button>
</body></html>
