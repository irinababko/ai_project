<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px 32px;background:var(--bg-0);display:flex;gap:36px;flex-wrap:wrap;align-items:flex-end;}
.fig{display:flex;flex-direction:column;gap:6px;}
.num{font-family:var(--font-data);font-weight:700;font-size:42px;letter-spacing:var(--tracking-data);color:var(--fg-1);line-height:1;}
.sub{font:500 13px/1.2 var(--font-data);color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;}
.note{flex-basis:100%;color:var(--fg-3);font-size:12px;font-family:var(--font-data);letter-spacing:.04em;text-transform:uppercase;}
</style></head><body>
<div class="fig"><span class="num">+112.10%</span><span class="sub">Search Visibility</span></div>
<div class="fig"><span class="num">3x</span><span class="sub">Qualified Leads</span></div>
<div class="fig"><span class="num">68.5%</span><span class="sub">Map Pack</span></div>
<div class="fig"><span class="num">2–6 wk</span><span class="sub">First Results</span></div>
<div class="note">Inter 500/700 · negative tracking − used inside chart widgets &amp; stat cards</div>
</body></html>
