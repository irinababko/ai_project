<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.row{display:flex;align-items:baseline;gap:14px;}
.dot{width:24px;height:24px;border-radius:50%;border:1px solid var(--hairline);flex:none;}
.lbl{font:500 11px/1.2 var(--font-data);text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3);width:90px;flex:none}
.smp{font:500 18px/1.2 var(--font-display);}
</style></head><body>
<div class="row"><div class="dot" style="background:var(--fg-1)"></div><div class="lbl">--fg-1</div><span class="smp" style="color:var(--fg-1)">Headlines · 100%</span></div>
<div class="row"><div class="dot" style="background:var(--fg-2)"></div><div class="lbl">--fg-2</div><span class="smp" style="color:var(--fg-2)">Primary body · 80%</span></div>
<div class="row"><div class="dot" style="background:var(--fg-3)"></div><div class="lbl">--fg-3</div><span class="smp" style="color:var(--fg-3)">Secondary · 60%</span></div>
<div class="row"><div class="dot" style="background:var(--fg-4)"></div><div class="lbl">--fg-4</div><span class="smp" style="color:var(--fg-4)">Muted · 50%</span></div>
<div class="row"><div class="dot" style="background:var(--fg-mute)"></div><div class="lbl">--fg-mute</div><span class="smp" style="color:var(--fg-mute)">Slate-400 sub</span></div>
<div class="row"><div class="dot" style="background:var(--fg-mute-2)"></div><div class="lbl">--fg-mute-2</div><span class="smp" style="color:var(--fg-mute-2)">Slate-500 icons</span></div>
<div class="row"><div class="dot" style="background:var(--fg-soft)"></div><div class="lbl">--fg-soft</div><span class="smp" style="color:var(--fg-soft)">Slate-300 CTAs</span></div>
<div class="row"><div class="dot" style="background:var(--brand-blue)"></div><div class="lbl">link</div><span class="smp" style="color:var(--brand-blue)">FAQ accent</span></div>
</body></html>
