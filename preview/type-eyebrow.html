<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px 32px;background:var(--bg-0);display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:var(--r-pill);background:rgba(49,49,49,0.16);box-shadow:var(--shadow-pill);}
.pill span{font-family:var(--font-display);font-weight:500;font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);color:var(--fg-1);line-height:1.33;}
.note{flex-basis:100%;color:var(--fg-3);font-size:12px;font-family:var(--font-data);letter-spacing:.04em;text-transform:uppercase;margin-top:6px;}
</style></head><body>
<div class="pill"><span>Services</span></div>
<div class="pill"><span>How It Works</span></div>
<div class="pill"><span>Why Us</span></div>
<div class="pill"><span>Our Work</span></div>
<div class="pill"><span>FAQ</span></div>
<div class="pill"><span>Free Visibility Audit</span></div>
<div class="note">Eyebrow pill · 19.8/500 · tracking 0.20em · signature metal bezel + blue underglow</div>
</body></html>
