<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:flex;align-items:flex-start;gap:24px;}
.rail{display:flex;flex-direction:column;align-items:center;gap:18px;flex:none;}
.play{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(rgba(40,49,74,0) 0%,rgb(85,96,117) 75%);
  border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;
}
.line{width:2px;flex:1;background:rgba(255,255,255,0.5);min-height:30px;}
.step{flex:1;}
.eb{display:inline-block;font:500 12px/1 var(--font-display);letter-spacing:.2em;color:#fff;background:rgba(49,49,49,0.16);box-shadow:var(--shadow-pill);padding:6px 14px;border-radius:9999px;margin-bottom:12px;}
.h{font:500 26px/1.1 var(--font-display);color:#fff;margin:0 0 8px;letter-spacing:-.02em;}
.p{font:400 16px/1.5 var(--font-body);color:var(--fg-3);margin:0;max-width:430px;}
</style></head><body>
<div class="rail"><div class="play">▶</div><div class="line"></div><div class="play">◐</div></div>
<div class="step">
  <span class="eb">Step 01</span>
  <h3 class="h">Tell us about your business</h3>
  <p class="p">We run a deep visibility audit — site, profiles, content, AI mentions — so the plan is grounded in your starting point, not a template.</p>
</div>
</body></html>
