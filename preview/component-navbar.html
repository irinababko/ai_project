<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px 24px;background:var(--bg-0);}
.nav{
  background:var(--bg-2);border-radius:20px;box-shadow:var(--shadow-flat);
  padding:10px 27px;display:flex;align-items:center;justify-content:space-between;height:46px;
}
.logo{font:700 22px/1 var(--font-display);color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;}
.dot{width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,#7b64ff,#0a5cff);}
.links{display:flex;gap:32px;color:var(--fg-2);font:500 16px/1 var(--font-display);}
.cta{
  padding:11px 20px;border-radius:10.25px;
  background:rgba(78,47,255,0.4);
  border:1.28px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(18px);
  box-shadow:inset 0 0 7.7px 3.8px rgba(255,255,255,0.25);
  color:#fff;font:500 16px/1 var(--font-display);
}
</style></head><body>
<div class="nav">
  <div class="logo"><span class="dot"></span>Proximity</div>
  <div class="links"><span>Services</span><span>How-it-Works</span><span>Why Us</span><span>FAQ</span></div>
  <div class="cta">book a call</div>
</div>
</body></html>
