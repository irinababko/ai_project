<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px 24px;background:var(--bg-0);display:flex;gap:32px;align-items:center;flex-wrap:wrap;}
.box{width:170px;height:120px;border-radius:20px;display:flex;align-items:flex-end;padding:12px;}
.lbl{font:500 11px/1.3 var(--font-data);color:var(--fg-2);text-transform:uppercase;letter-spacing:.06em;}
.b1{background:rgba(255,255,255,0.04);border:1px solid var(--glass-stroke);box-shadow:var(--shadow-card);backdrop-filter:blur(20px);}
.b2{background:rgba(49,49,49,0.16);border-radius:9999px;height:50px;width:170px;box-shadow:var(--shadow-pill);align-items:center;justify-content:center;}
.b3{background:rgba(78,47,255,0.4);border:1px solid var(--glass-stroke);box-shadow:var(--shadow-cta-glass);backdrop-filter:blur(18px);align-items:center;justify-content:center;height:50px;width:170px;border-radius:10px;}
.b4{background:var(--bg-2);box-shadow:var(--shadow-flat);border-radius:20px;}
</style></head><body>
<div class="box b1"><span class="lbl">card · stack + cool inset</span></div>
<div class="box b4"><span class="lbl">flat · navbar drop</span></div>
<div class="box b2"><span class="lbl" style="color:#fff">pill bezel</span></div>
<div class="box b3"><span class="lbl" style="color:#fff">cta glass inset</span></div>
</body></html>
