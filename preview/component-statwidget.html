<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:flex;gap:18px;}
.w{
  width:230px;height:200px;border-radius:20px;padding:20px;position:relative;overflow:hidden;
  background:radial-gradient(rgba(255,255,255,0.08) 0%,rgba(255,255,255,0) 100%),linear-gradient(rgba(46,51,90,0) 0%,rgba(28,27,51,0.1) 100%);
  border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(20px);box-shadow:var(--shadow-card);
}
.lbl{font:400 12px/1.2 var(--font-data);color:#fff;letter-spacing:-.04em;}
.big{font:700 28px/1 var(--font-display);color:#fff;margin-top:8px;letter-spacing:-.02em;}
.wave{position:absolute;left:0;right:0;bottom:0;height:80px;background:linear-gradient(180deg,rgb(104,79,244),rgb(65,39,216));border-radius:0 0 20px 20px;}
.dots{position:absolute;left:14px;right:14px;bottom:30px;display:flex;justify-content:space-between;color:#fff;font:400 10px/1 var(--font-data);}
.bar{position:absolute;left:14px;right:14px;bottom:50px;height:14px;border-radius:9px;background:#fff;overflow:hidden;}
.bar > i{display:block;height:100%;width:70%;background:#5a41ea;border-radius:9px;}
</style></head><body>
<div class="w">
  <div class="lbl">Search Visibility</div>
  <div class="big">+112.10%</div>
  <div class="wave"></div>
  <div class="dots"><span>1 Aug</span><span>2 Aug</span><span>3 Aug</span></div>
</div>
<div class="w">
  <div class="lbl">Local Ranking Growth</div>
  <div class="big">68.5%</div>
  <div style="font:400 11px/1.4 var(--font-data);color:#c8b1f8;margin-top:4px;">Month / 30 days</div>
  <div class="bar"><i></i></div>
  <div class="dots"><span>Qualified Leads</span><span>+80.9%</span></div>
</div>
<div class="w">
  <div class="lbl">From high-intent searches</div>
  <div class="big">+77%</div>
  <div style="font:400 13px/1.4 var(--font-body);color:rgba(255,255,255,0.6);margin-top:6px;">Growth in calls and enquiries from search.</div>
</div>
</body></html>
