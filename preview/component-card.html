<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:flex;gap:22px;}
.card{
  width:300px;height:260px;border-radius:40px;padding:20px;
  position:relative;overflow:hidden;
  background:radial-gradient(rgba(255,255,255,0.08) 0%,rgba(255,255,255,0) 100%),linear-gradient(rgba(46,51,90,0) 0%,rgba(28,27,51,0.1) 100%);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow-card);
}
.tile{
  width:55px;height:48px;border-radius:12px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;
}
.stat{font:500 42px/1 var(--font-data);color:#fff;letter-spacing:-0.06em;margin-top:50px;}
.h{font:500 18px/1.3 var(--font-display);color:#fff;margin-top:14px;}
.sub{font:400 16px/1.45 var(--font-body);color:rgba(255,255,255,0.6);margin-top:8px;}
</style></head><body>
<div class="card">
  <div class="tile">⌕</div>
  <div class="stat">3x</div>
  <div class="h">More Qualified Leads</div>
  <div class="sub">Local service businesses competing in crowded city markets</div>
</div>
<div class="card">
  <div class="tile">◎</div>
  <div class="stat">68.5%</div>
  <div class="h">Map Pack Visibility</div>
  <div class="sub">Multi-location brands building consistent rankings across regions</div>
</div>
</body></html>
