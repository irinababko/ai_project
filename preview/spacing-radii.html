<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
.box{background:rgba(255,255,255,0.06);border:1px solid var(--glass-stroke);width:90px;height:70px;display:flex;align-items:flex-end;justify-content:center;padding:8px;}
.lbl{font:500 11px/1.2 var(--font-data);color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;}
</style></head><body>
<div class="box" style="border-radius:8px"><span class="lbl">8 · xs</span></div>
<div class="box" style="border-radius:12px"><span class="lbl">12 · sm</span></div>
<div class="box" style="border-radius:15px"><span class="lbl">15 · md</span></div>
<div class="box" style="border-radius:20px"><span class="lbl">20 · lg</span></div>
<div class="box" style="border-radius:22.5px"><span class="lbl">22.5 · xl</span></div>
<div class="box" style="border-radius:40px"><span class="lbl">40 · 2xl</span></div>
<div class="box" style="border-radius:9999px;width:120px"><span class="lbl">pill · 9999</span></div>
</body></html>
