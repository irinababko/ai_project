<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-0);display:flex;gap:24px;align-items:center;}
.av{width:140px;height:140px;border-radius:20px;background:url(../assets/images/testimonial-avatar.jpg) center/cover;flex:none;}
.body{flex:1;}
.q{font:500 22px/1.45 var(--font-display);color:#fff;margin:0 0 14px;letter-spacing:0;}
.who{font:500 16px/1.4 var(--font-body);color:#fff;}
.role{font:400 14px/1.4 var(--font-body);color:rgba(255,255,255,0.7);}
.btns{margin-left:auto;display:flex;gap:10px;flex:none;}
.b{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.b1{background:var(--brand-blue);color:#fff;border:none;}
.b2{background:transparent;color:rgb(127,127,138);border:1px solid rgb(127,127,138);}
</style></head><body>
<div class="av"></div>
<div class="body">
  <p class="q">"Their team handled the details — GBP updates, listings, technical fixes — and kept us in the loop."</p>
  <div class="who">Chris D.</div>
  <div class="role">Marketing Director</div>
</div>
<div class="btns"><div class="b b2">←</div><div class="b b1">→</div></div>
</body></html>
